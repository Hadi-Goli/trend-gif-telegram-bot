name: Deploy Bot to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate .env file dynamically
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
          echo "IP_ADDRESS=${{ secrets.SERVER_IP }}" >> .env
          echo "PORT=8443" >> .env
          echo "OWNER_ID=${{ secrets.OWNER_ID }}" >> .env
          echo "CHANNEL_USERNAME=${{ secrets.CHANNEL_USERNAME }}" >> .env
          echo "KEYBOARD_MODE=${{ secrets.KEYBOARD_MODE }}" >> .env
          echo "REVIEW_GROUP_ID=${{ secrets.REVIEW_GROUP_ID }}" >> .env
          
          # Add all Admin-Specific Proxy Bots automatically
          echo "$SECRETS_JSON" | jq -r 'to_entries | .[] | select(.key | startswith("ADMIN_BOT_")) | "\(.key)=\(.value)"' >> .env

      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/root/telegram_bot"
          
      - name: Build and Restart Docker Containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/telegram_bot
            
            # Rebuild and restart the container
            docker compose down
            docker compose up -d --build

      - name: Send Telegram Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TEXT="✅ دیپلوی ربات با موفقیت انجام شد و ربات در حال اجراست."
          else
            TEXT="❌ دیپلوی ربات با خطا مواجه شد. لطفا لاگ‌های گیت‌هاب اکشن را بررسی کنید."
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
            -d chat_id=276868456 \
            -d text="$TEXT"
